backend:
  name: git-gateway
  repo: sumcatherine-48/Store
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/c64bd173-c012-43ce-9bf1-8f32873a21f3/pkce
  auth_token_endpoint: /sites/c64bd173-c012-43ce-9bf1-8f32873a21f3/token
  gateway_url: https://gateway.decapbridge.com
media_folder: "images"
public_folder: "images"
locale: "en"

collections:
  - name: "products"
    label: "Products"
    files:
      - name: "products"
        label: "Product List"
        file: "data/products.json"
        fields:
          - label: "Product List"
            name: "products"
            widget: "list"
            label_singular: "Product"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Tag (e.g. Cat Ears · Velvet)", name: "tag", widget: "string" }
              - { label: "Price (RM)", name: "price", widget: "number", value_type: "float" }
              - { label: "In Stock", name: "instock", widget: "boolean", default: true }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Description", name: "description", widget: "text" }

  - name: "shipping"
    label: "Shipping"
    files:
      - name: "shipping"
        label: "Shipping Regions"
        file: "data/shipping.json"
        fields:
          - label: "Regions List"
            name: "regions"
            widget: "list"
            label_singular: "Region"
            fields:
              - { label: "Region Name", name: "name", widget: "string" }
              - { label: "Shipping Fee (RM)", name: "rate", widget: "number", value_type: "float" }
              - { label: "Delivery Note", name: "note", widget: "string" }